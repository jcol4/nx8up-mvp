name: i18n

on:
  push:
    paths:
      - 'messages/**'
      - 'scripts/i18n-parity.mjs'
      - '.github/workflows/i18n.yml'
  pull_request:
    paths:
      - 'messages/**'
      - 'scripts/i18n-parity.mjs'
      - '.github/workflows/i18n.yml'

jobs:
  parity:
    name: locale parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check locale key parity
        run: node scripts/i18n-parity.mjs
